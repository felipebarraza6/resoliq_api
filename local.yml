services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    image: api-dev
    volumes:
      - .:/code
      - ./db.sqlite3:/code/db.sqlite3
      - ./media:/code/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-not-for-production
      - ALLOWED_HOSTS=*
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"


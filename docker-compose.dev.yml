# Docker Compose para DESARROLLO LOCAL
# Uso: docker compose -f docker-compose.dev.yml up --build
#
# Este archivo levanta solo la API Django con recarga automática.
# Usa SQLite por defecto (no requiere PostgreSQL).

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    image: resoliq-api-dev
    container_name: resoliq-api-dev
    volumes:
      - .:/code
      - ./db.sqlite3:/code/db.sqlite3
      - ./media:/code/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-not-for-production
      - ALLOWED_HOSTS=*
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
